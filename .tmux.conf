# Let programs inside tmux set the LOCAL clipboard via OSC 52. Without this,
# tmux swallows the escape sequence and the `clip` alias silently does nothing
# over SSH. WezTerm supports OSC 52 out of the box.
set -g set-clipboard on

# Terminal + colour. Requires the outer terminal to support truecolor.
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Start numbering at 1 — 0 is a long reach on the keyboard.
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one closes, so there are no gaps.
set -g renumber-windows on

# Big scrollback — useful when a long agent run scrolls past.
set -g history-limit 50000

# Mouse: scroll, select panes, resize.
set -g mouse on

# No delay after Escape (otherwise vim and friends feel laggy).
set -sg escape-time 0

# Keep sessions alive rather than exiting when the last window closes.
set -g detach-on-destroy off

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Split panes with | and - , and keep the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows keep the current directory too.
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar: minimal, session name on the left, date/time on the right.
set -g status-style "bg=default fg=colour244"
set -g status-left "#[fg=colour109] #S #[default]"
set -g status-right "#[fg=colour244]%d %b %H:%M "
set -g status-left-length 30
set -g window-status-current-style "fg=colour223 bold"
